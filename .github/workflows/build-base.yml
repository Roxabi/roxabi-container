name: Build and push base image

on:
  push:
    branches: [main]
    paths: [images/base/**]
    tags: ['base/v*']
  schedule:
    - cron: '0 4 * * 1'  # Every Monday 04:00 UTC — keeps claude-code, uv, bun fresh
  workflow_dispatch:
    inputs:
      tag:
        description: 'Extra tag to push alongside :latest (e.g. test, staging)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: roxabi/base

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: tags
        run: |
          TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          # Git tag base/vX.Y.Z → also push :vX.Y.Z
          if [[ "${{ github.ref }}" == refs/tags/base/v* ]]; then
            VERSION="${{ github.ref_name }}"   # e.g. base/v1.0.0
            VERSION="${VERSION#base/}"          # strip prefix → v1.0.0
            TAGS="${TAGS}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}"
          fi
          # Manual dispatch with extra tag
          if [ -n "${{ inputs.tag }}" ]; then
            TAGS="${TAGS}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}"
          fi
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "${TAGS}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: images/base
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
